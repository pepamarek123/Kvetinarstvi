<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340" width="300" height="340">
  <!-- Průhledné pozadí -->

  <!-- Skupina celé lilie, posunuta dolů -->
  <g transform="translate(150, 175)">

    <!-- 6 okvětních lístků (tepalů) rozmístěných po 60° -->

    <!-- Tepal 1 -->
    <g transform="rotate(0)">
      <path d="M0,0 C-28,-55 -22,-130 0,-160 C22,-130 28,-55 0,0 Z"
            fill="url(#petal1)" opacity="0.95" stroke="#e8c8d0" stroke-width="0.5"/>
      <!-- středová žilka -->
      <line x1="0" y1="-8" x2="0" y2="-148" stroke="#f0d8e0" stroke-width="1" opacity="0.6"/>
    </g>

    <!-- Tepal 2 -->
    <g transform="rotate(60)">
      <path d="M0,0 C-28,-55 -22,-130 0,-160 C22,-130 28,-55 0,0 Z"
            fill="url(#petal2)" opacity="0.95" stroke="#e8c8d0" stroke-width="0.5"/>
      <line x1="0" y1="-8" x2="0" y2="-148" stroke="#f0d8e0" stroke-width="1" opacity="0.6"/>
    </g>

    <!-- Tepal 3 -->
    <g transform="rotate(120)">
      <path d="M0,0 C-28,-55 -22,-130 0,-160 C22,-130 28,-55 0,0 Z"
            fill="url(#petal1)" opacity="0.95" stroke="#e8c8d0" stroke-width="0.5"/>
      <line x1="0" y1="-8" x2="0" y2="-148" stroke="#f0d8e0" stroke-width="1" opacity="0.6"/>
    </g>

    <!-- Tepal 4 -->
    <g transform="rotate(180)">
      <path d="M0,0 C-28,-55 -22,-130 0,-160 C22,-130 28,-55 0,0 Z"
            fill="url(#petal2)" opacity="0.95" stroke="#e8c8d0" stroke-width="0.5"/>
      <line x1="0" y1="-8" x2="0" y2="-148" stroke="#f0d8e0" stroke-width="1" opacity="0.6"/>
    </g>

    <!-- Tepal 5 -->
    <g transform="rotate(240)">
      <path d="M0,0 C-28,-55 -22,-130 0,-160 C22,-130 28,-55 0,0 Z"
            fill="url(#petal1)" opacity="0.95" stroke="#e8c8d0" stroke-width="0.5"/>
      <line x1="0" y1="-8" x2="0" y2="-148" stroke="#f0d8e0" stroke-width="1" opacity="0.6"/>
    </g>

    <!-- Tepal 6 -->
    <g transform="rotate(300)">
      <path d="M0,0 C-28,-55 -22,-130 0,-160 C22,-130 28,-55 0,0 Z"
            fill="url(#petal2)" opacity="0.95" stroke="#e8c8d0" stroke-width="0.5"/>
      <line x1="0" y1="-8" x2="0" y2="-148" stroke="#f0d8e0" stroke-width="1" opacity="0.6"/>
    </g>

    <!-- 6 tyčinek -->
    <g opacity="0.9">
      <g transform="rotate(0)">
        <line x1="0" y1="0" x2="0" y2="-72" stroke="#d4a017" stroke-width="1.5"/>
        <ellipse cx="0" cy="-75" rx="4" ry="7" fill="#c8860a" transform="rotate(25, 0, -75)"/>
      </g>
      <g transform="rotate(60)">
        <line x1="0" y1="0" x2="0" y2="-68" stroke="#d4a017" stroke-width="1.5"/>
        <ellipse cx="0" cy="-71" rx="4" ry="7" fill="#c8860a" transform="rotate(-20, 0, -71)"/>
      </g>
      <g transform="rotate(120)">
        <line x1="0" y1="0" x2="0" y2="-74" stroke="#d4a017" stroke-width="1.5"/>
        <ellipse cx="0" cy="-77" rx="4" ry="7" fill="#c8860a" transform="rotate(15, 0, -77)"/>
      </g>
      <g transform="rotate(180)">
        <line x1="0" y1="0" x2="0" y2="-70" stroke="#d4a017" stroke-width="1.5"/>
        <ellipse cx="0" cy="-73" rx="4" ry="7" fill="#c8860a" transform="rotate(-30, 0, -73)"/>
      </g>
      <g transform="rotate(240)">
        <line x1="0" y1="0" x2="0" y2="-73" stroke="#d4a017" stroke-width="1.5"/>
        <ellipse cx="0" cy="-76" rx="4" ry="7" fill="#c8860a" transform="rotate(20, 0, -76)"/>
      </g>
      <g transform="rotate(300)">
        <line x1="0" y1="0" x2="0" y2="-69" stroke="#d4a017" stroke-width="1.5"/>
        <ellipse cx="0" cy="-72" rx="4" ry="7" fill="#c8860a" transform="rotate(-15, 0, -72)"/>
      </g>
    </g>

    <!-- Pestík (střední) -->
    <line x1="0" y1="0" x2="0" y2="-80" stroke="#a0c060" stroke-width="2"/>
    <circle cx="0" cy="-83" r="5" fill="#6a9a30" opacity="0.9"/>

    <!-- Střed -->
    <circle cx="0" cy="0" r="8" fill="#f5e8c0" opacity="0.8"/>
  </g>

  <!-- Definice přechodů pro lístky -->
  <defs>
    <radialGradient id="petal1" cx="50%" cy="80%" r="60%">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#fdf0f4"/>
      <stop offset="100%" stop-color="#f5dde5"/>
    </radialGradient>
    <radialGradient id="petal2" cx="50%" cy="80%" r="60%">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#fce8ee"/>
      <stop offset="100%" stop-color="#f0d0da"/>
    </radialGradient>
  </defs>
</svg>
